{% if plain_text %}
{{ subject }}

{{ intro }}

{{ detalles }}

{{ cta_text }}: {{ cta_url }}
{% else %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ subject }}</title>
  </head>
  <body style="margin:0;padding:0;background:#edf7f4;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#edf7f4;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.06);">
            <tr>
              <td style="background:linear-gradient(135deg,#0b2f24 0%,#006b3f 55%,#1f8f63 100%);padding:18px 24px;color:#fff;">
                <div style="font-size:18px;font-weight:800;letter-spacing:-.2px;">Assist Care</div>
                <div style="font-size:12px;opacity:.9;font-weight:600;margin-top:2px;">Confirmación de acompañamiento</div>
              </td>
            </tr>
            <tr>
              <td style="padding:22px 24px 10px 24px;">
                <div style="display:inline-block;background:#e1f5ee;border:1px solid #cbeee2;color:#065f46;font-size:11px;font-weight:800;padding:6px 10px;border-radius:999px;letter-spacing:.08em;text-transform:uppercase;">
                  Confirmado
                </div>
                <h1 style="margin:14px 0 0 0;font-size:22px;line-height:1.25;color:#0b2f24;letter-spacing:-.2px;">{{ subject }}</h1>
                <p style="margin:10px 0 0 0;font-size:14px;line-height:1.6;color:#315348;">{{ intro }}</p>
              </td>
            </tr>
            <tr>
              <td style="padding:14px 24px 4px 24px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4fbf7;border:1px solid #d7eee4;border-radius:16px;">
                  <tr>
                    <td style="padding:14px 16px;color:#16372d;font-size:13px;line-height:1.45;white-space:pre-line;">
                      {{ detalles }}
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 24px 18px 24px;">
                <a href="{{ cta_url }}" style="display:inline-block;background:#006b3f;color:#fff;text-decoration:none;font-weight:800;font-size:14px;padding:12px 16px;border-radius:14px;">
                  {{ cta_text }}
                </a>
              </td>
            </tr>
            <tr>
              <td style="background:#e8f5ef;padding:14px 24px;color:#557669;font-size:12px;line-height:1.5;">
                © {% now "Y" %} Assist Care · Datos cifrados y protegidos
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
{% endif %}
