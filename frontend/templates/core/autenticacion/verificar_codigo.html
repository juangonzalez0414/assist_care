<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verificar Código - Axius</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    {% include 'includes/global_ui_assets.html' %}
</head>
<body class="bg-gradient-to-tr from-[#edf7f4] via-[#f5fbf9] to-[#e4f3ee] min-h-screen flex flex-col justify-center items-center p-4 font-sans">
    {% if messages %}
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                const toast = Swal.mixin({
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 4000,
                    timerProgressBar: true,
                    iconColor: '#006B3F',
                    background: '#ffffff',
                    color: '#0f172a',
                    customClass: {
                        popup: 'rounded-3xl border border-emerald-100 bg-white shadow-[0_18px_45px_rgba(0,107,63,0.16)] px-4 py-3',
                        title: 'text-slate-900 text-sm font-bold',
                        htmlContainer: 'text-slate-600 text-xs mt-0.5',
                        icon: 'border-0 bg-emerald-50 text-emerald-700',
                        timerProgressBar: 'bg-emerald-500',
                    },
                });
                {% for message in messages %}
                    setTimeout(function () {
                        toast.fire({
                            icon: '{% if "error" in message.tags %}error{% elif "success" in message.tags %}success{% elif "warning" in message.tags %}warning{% else %}info{% endif %}',
                            title: '{% if "error" in message.tags %}Atención{% elif "success" in message.tags %}Todo listo{% elif "warning" in message.tags %}Importante{% else %}Aviso{% endif %}',
                            text: '{{ message|escapejs }}',
                        });
                    }, {{ forloop.counter0 }} * 450);
                {% endfor %}
            });
        </script>
    {% endif %}

    <main class="bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-50/50 p-10 max-w-md w-full">
        <h1 class="text-xl font-semibold text-gray-800 text-center mb-2">Verificar Código</h1>
        <p class="text-sm text-gray-500 text-center mb-8 leading-relaxed px-4">
            Hemos enviado un código de verificación a tu correo. Por favor ingrésalo a continuación.
        </p>

        <form method="POST" action="">
            {% csrf_token %}

            <div class="mb-5">
                <label for="codigo" class="text-sm font-medium text-gray-700 mb-1.5 block text-center">Código de Verificación</label>
                <input
                    id="codigo"
                    name="codigo"
                    type="text"
                    inputmode="numeric"
                    autocomplete="one-time-code"
                    placeholder="123456"
                    maxlength="6"
                    class="w-full px-3 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#006B3F]/20 focus:border-[#006B3F] text-gray-900 placeholder:text-gray-400 tracking-widest text-center text-2xl font-bold"
                    required
                />
            </div>

            <button type="submit" class="bg-[#006B3F] hover:bg-[#005230] text-white font-medium py-3 px-4 rounded-xl transition-all duration-200 shadow-sm text-center w-full block mt-6">
                Verificar y Continuar
            </button>

            <div class="text-center mt-6 text-sm text-gray-600">
                <a href="{% url 'login' %}" class="text-[#006B3F] font-medium hover:underline">Volver a iniciar sesión</a>
            </div>
        </form>
    </main>
</body>
</html>
